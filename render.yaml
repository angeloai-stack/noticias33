services:
  - type: web
    name: n33-strapi
    runtime: node
    plan: starter
    region: oregon
    rootDir: cms
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      # Pega el resto en el dashboard de Render (secrets):
      # DATABASE_URL, APP_KEYS, API_TOKEN_SALT, ADMIN_JWT_SECRET,
      # JWT_SECRET, TRANSFER_TOKEN_SALT, ENCRYPTION_KEY
